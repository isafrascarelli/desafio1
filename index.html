<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2 id="nomeUsuario"></h2> 

<div class="app">

  <header>
    <h1>📝 Minhas Tarefas</h1>
    <button id="tema">🌙</button>
    <button id="limparTudo">Limpar</button>
  </header>

  <div class="input-area">
    <input type="text" id="inputTarefa" placeholder="Digite uma tarefa...">
    <button id="btnAdicionar">Adicionar</button>
  </div>

  <div class="filtros">
    <button id="todas">Todas</button>
    <button id="pendentes">Pendentes</button>
    <button id="concluidas">Concluídas</button>
  </div>

  <ul id="lista"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
